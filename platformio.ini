; Sofar Inverter Modbus RTU - ESP32 Reader/Writer
; Zeus 2.0 pin uyumlu (GPIO17=TX, GPIO16=RX, GPIO5=DE/RE)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 9600
upload_speed = 115200
monitor_filters = colorize, time, esp32_exception_decoder

build_flags =
    -DCORE_DEBUG_LEVEL=2
    -Os
    -Wall

lib_deps =
    bblanchon/ArduinoJson@^6.21.5
